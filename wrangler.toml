name = "catalogo-placas"
compatibility_date = "2024-01-01"

[build]
command = "pnpm run build"
output_dir = "dist"

[variables]
VITE_SUPABASE_URL = "REDACTED_FOR_SECURITY"
VITE_SUPABASE_ANON_KEY = "REDACTED_FOR_SECURITY"

# Si usas Cloudflare Pages con monorepo, añade:
# [build.environment]
# VITE_SUPABASE_URL = "tu_url"
# VITE_SUPABASE_ANON_KEY = "tu_clave"
